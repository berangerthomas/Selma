<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="450" fill="#f8fafc" />

  <!-- Title -->
  <text x="400" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="bold" fill="#1e293b" text-anchor="middle">
    Distribución de Especies de Mamíferos
  </text>

  <!-- Grid Lines & X-Axis Labels -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">
    <line x1="260" y1="80" x2="260" y2="390" stroke="#cbd5e1" stroke-width="2" />
    <text x="260" y="410">0%</text>
    <line x1="360" y1="80" x2="360" y2="390" stroke="#e2e8f0" stroke-dasharray="4" />
    <text x="360" y="410">10%</text>
    <line x1="460" y1="80" x2="460" y2="390" stroke="#e2e8f0" stroke-dasharray="4" />
    <text x="460" y="410">20%</text>
    <line x1="560" y1="80" x2="560" y2="390" stroke="#e2e8f0" stroke-dasharray="4" />
    <text x="560" y="410">30%</text>
    <line x1="660" y1="80" x2="660" y2="390" stroke="#e2e8f0" stroke-dasharray="4" />
    <text x="660" y="410">40%</text>
    <line x1="760" y1="80" x2="760" y2="390" stroke="#e2e8f0" stroke-dasharray="4" />
    <text x="760" y="410">50%</text>
  </g>

  <!-- Bars and Labels -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="15">
    
    <!-- Rodents -->
    <text x="240" y="117.5" fill="#334155" text-anchor="end" dominant-baseline="middle">Roedores</text>
    <rect x="260" y="100" width="420" height="35" fill="#3b82f6" rx="4" />
    <text x="690" y="117.5" fill="#3b82f6" font-weight="bold" text-anchor="start" dominant-baseline="middle">42%</text>

    <!-- Bats -->
    <text x="240" y="177.5" fill="#334155" text-anchor="end" dominant-baseline="middle">Murciélagos</text>
    <rect x="260" y="160" width="220" height="35" fill="#8b5cf6" rx="4" />
    <text x="490" y="177.5" fill="#8b5cf6" font-weight="bold" text-anchor="start" dominant-baseline="middle">22%</text>

    <!-- Shrews & Moles -->
    <text x="240" y="237.5" fill="#334155" text-anchor="end" dominant-baseline="middle">Musarañas y Topos</text>
    <rect x="260" y="220" width="80" height="35" fill="#10b981" rx="4" />
    <text x="350" y="237.5" fill="#10b981" font-weight="bold" text-anchor="start" dominant-baseline="middle">8%</text>

    <!-- Primates -->
    <text x="240" y="297.5" fill="#334155" text-anchor="end" dominant-baseline="middle">Primates</text>
    <rect x="260" y="280" width="80" height="35" fill="#f59e0b" rx="4" />
    <text x="350" y="297.5" fill="#f59e0b" font-weight="bold" text-anchor="start" dominant-baseline="middle">8%</text>

    <!-- Others -->
    <text x="240" y="357.5" fill="#334155" text-anchor="end" dominant-baseline="middle">Otros</text>
    <rect x="260" y="340" width="200" height="35" fill="#64748b" rx="4" />
    <text x="470" y="357.5" fill="#64748b" font-weight="bold" text-anchor="start" dominant-baseline="middle">20%</text>

  </g>
</svg>