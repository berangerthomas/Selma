name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create_release_from_changelog:
    name: Create release and update body from CHANGELOG.md
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract changelog section
        id: extract
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          TAG_NO_V="${TAG#v}"
          echo "Searching CHANGELOG for tag: $TAG (also trying $TAG_NO_V)"
          awk -v tag="$TAG" -v tag2="$TAG_NO_V" '
            BEGIN{found=0}
            /^##\s+/{
              if(found==1) exit
              if(index($0,"[" tag "]") || index($0,tag) || index($0,"[" tag2 "]") || index($0,tag2)) {found=1; next} # Skip the title for release body
            }
            found==1{print}
          ' CHANGELOG.md > changelog_section.md || true
          if [ ! -s changelog_section.md ]; then
            echo "No matching changelog section for tag $TAG"
            echo "Release notes could not be automatically extracted from CHANGELOG.md" > changelog_section.md
          fi
          echo "Wrote changelog_section.md"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body_path: changelog_section.md
          draft: false
          prerelease: false
